services:
  dmarc-dash:
    build: .
    ports:
      - "9693:3000"   # host 3000 is taken by cl-frontend; dashboard is on 9693
    environment:
      DATA_DIR: /app/data
      # PORT optional; defaults to 3000
    volumes:
      - ./data:/app/data      # holds dmarc.db, GeoLite2-City.mmdb, app.key
    restart: unless-stopped
